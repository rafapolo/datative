services:
  app:
    image: oven/bun:1
    working_dir: /app
    command: bun run index.ts
    restart: unless-stopped
    volumes:
      - .:/app
      - ./gcp-credentials.json:/gcp-credentials.json:ro
    environment:
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp-credentials.json
      PORT: 3003
    labels:
      - traefik.enable=true
      - traefik.http.routers.datative.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.datative.entrypoints=https
      - traefik.http.routers.datative.tls=true
      - traefik.http.routers.datative.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.datative.loadbalancer.server.port=3003
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
