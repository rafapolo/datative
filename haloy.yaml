name: datative
server: haloy.xn--2dk.xyz
domains:
  - domain: datative.xn--2dk.xyz
port: 3003
health_check_path: /
env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3003"
  - name: HETZNER_S3_BUCKET
    from:
      env: HETZNER_S3_BUCKET
  - name: HETZNER_S3_ENDPOINT
    from:
      env: HETZNER_S3_ENDPOINT
  - name: S3_ACCESS_KEY_ID
    from:
      env: S3_ACCESS_KEY_ID
  - name: S3_SECRET_ACCESS_KEY
    from:
      env: S3_SECRET_ACCESS_KEY
