name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.FINLAND_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.FINLAND_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server with Haloy
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.FINLAND_USER }}@${{ secrets.FINLAND_HOST }}" "
            set -euo pipefail
            export PATH=\"\$HOME/.local/bin:\$PATH\"
            cd '${{ secrets.FINLAND_APP_DIR }}'
            git fetch origin main
            git reset --hard origin/main
            \$HOME/.local/bin/haloy deploy
          "
